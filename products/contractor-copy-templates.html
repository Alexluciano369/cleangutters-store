<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contractor Copy Templates</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e5e5e5; line-height: 1.7; padding: 40px 24px; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; color: #fff; }
  .subtitle { color: #888; font-size: 1.05rem; margin-bottom: 32px; }
  .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .card-header { font-weight: 700; font-size: 1.1rem; color: #fff; margin-bottom: 4px; }
  .card-body { color: #888; font-size: 0.9rem; }
  .copy-text { font-weight: 600; font-size: 1rem; color: #fff; margin: 8px 0; }
  .source { color: #666; font-size: 0.8rem; }
  .analysis { color: #888; font-size: 0.85rem; margin-top: 8px; }
  p { margin-bottom: 16px; color: #bbb; }
  ul { margin: 8px 0 16px 20px; }
  li { margin-bottom: 8px; color: #bbb; }
  li strong { color: #e5e5e5; }
  .swipe { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 12px; }
  .swipe:hover { border-color: #4ade80; }
</style>
</head>
<body>
<div class="container">
  <div style="text-align:center; margin-bottom: 48px;">
    <div style="font-size: 3rem; margin-bottom: 12px;">✍</div>
    <h1>Contractor Copy Templates</h1>
    <p class="subtitle">200+ annotated copy examples. Headlines, emails, landing pages, CTAs.</p>
  </div>
</div>
</body>
</html>

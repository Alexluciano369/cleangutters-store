<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Local Service Business Blueprint</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e5e5e5; line-height: 1.7; padding: 40px 24px; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; color: #fff; }
  h2 { font-size: 1.4rem; font-weight: 700; margin: 40px 0 16px; color: #fff; border-bottom: 1px solid #222; padding-bottom: 8px; }
  h3 { font-size: 1.1rem; font-weight: 600; margin: 24px 0 12px; color: #f59e0b; }
  .subtitle { color: #888; font-size: 1.05rem; margin-bottom: 32px; }
  .highlight { background: #1a1508; border: 1px solid #3a2a08; border-radius: 12px; padding: 24px; margin: 24px 0; }
  .highlight h3 { margin-top: 0; }
  p { margin-bottom: 16px; color: #bbb; }
  ul { margin: 8px 0 16px 20px; }
  li { margin-bottom: 8px; color: #bbb; }
  li strong { color: #e5e5e5; }
  .chapter { background: #111; border: 1px solid #222; border-radius: 12px; padding: 20px; margin-bottom: 12px; }
  .chapter:hover { border-color: #f59e0b; }
  .ch-num { color: #f59e0b; font-weight: 800; font-size: 0.85rem; margin-bottom: 4px; }
  .ch-title { font-weight: 700; font-size: 1.05rem; color: #fff; margin-bottom: 4px; }
  .ch-desc { color: #888; font-size: 0.9rem; }
  .quote { border-left: 3px solid #f59e0b; padding: 16px 20px; margin: 24px 0; background: #111; border-radius: 0 8px 8px 0; font-style: italic; color: #ccc; }
  .stat { display: inline-block; background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px 20px; margin: 4px; text-align: center; }
  .stat-num { font-size: 1.4rem; font-weight: 800; color: #f59e0b; }
  .stat-label { font-size: 0.75rem; color: #666; }
</style>
</head>
<body>
<div class="container">
  <div style="text-align:center; margin-bottom: 48px;">
    <div style="font-size: 3rem; margin-bottom: 12px;">🏗️</div>
    <h1>The Local Service Business Blueprint</h1>
    <p class="subtitle">15 years of building a real service business — condensed into the playbook I wish I had on day one.</p>
    <div style="display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; margin-top: 24px;">
      <div class="stat"><div class="stat-num">15;</div><div class="stat-label">Years in'business</div></div>
      <div class="stat"><div class="stat-num">4</div><div class="stat-label">States covered</div></div>
      <div class="stat"><div class="stat-num">10,000+</div><div class="stat-label">Happy customers</div></div>
      <div class="stat"><div class="stat-num">50,000+</div><div class="stat-label">Jobs completed</div></div>
      <div class="stat"><div class="stat-num">4.9★</div><div class="stat-label">Average rating</div></div>
    </div>
  </div>
</div></body></html>

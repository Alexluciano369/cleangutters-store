<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Complete Digital Business Starter Kit</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e5e5e5; line-height: 1.7; padding: 40px 24px; }
  .container { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 8px; color: #fff; }
  h2 { font-size: 1.4rem; font-weight: 700; margin: 40px 0 16px; color: #fff; border-bottom: 1px solid #222; padding-bottom: 8px; }
  h3 { font-size: 1.1rem; font-weight: 600; margin: 24px 0 8px; color: #4ade80; }
  .subtitle { color: #888; font-size: 1.05rem; margin-bottom: 32px; }
  .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .card:hover { border-color: #4ade80; }
  .card-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 4px; }
  .card-desc { color: #888; font-size: 0.9rem; }
  .card-emoji { font-size: 1.8rem; margin-bottom: 8px; }
  .bonus { background: #0f1a0f; border-color: #1a3a1a; }
  .bonus .card-title { color: #4ade80; }
  p { margin-bottom: 16px; color: #bbb; }
  ul { margin: 8px 0 16px 20px; }
  li { margin-bottom: 6px; color: #bbb; }
  .tag { display: inline-block; background: #1a1a2e; color: #818cf8; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; margin-left: 8px; }
</style>
</head>
<body>
<div class="container">
  <div style="text-align:center; margin-bottom: 48px;">
    <div style="font-size: 3rem; margin-bottom: 12px;">🎯</div>
    <h1>The Complete Digital Business Starter Kit</h1>
    <p class="subtitle">All 6 products + exclusive bonuses. Everything you need to launch.</p>
  </div>

</div>
</body>
</html>

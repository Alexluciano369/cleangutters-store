<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Alex · Free Resources</title>
<meta name="description" content="Free frameworks and templates from 15 years of building a real business. Instant delivery. No fluff."/>
<meta property="og:title" content="Alex · Free Resources"/>
<meta property="og:description" content="Frameworks, templates, and playbooks from 15 years of building a real business."/>
<meta name="twitter:card" content="summary"/>
<style>
:root {
  --color-bg: #0a0a0f;
  --color-bg-deep: #0f0f18;
  --color-surface: #161622;
  --color-border: #2a2a3a;
  --color-fg: #f0f0f5;
  --color-fg-muted: #9999aa;
  --color-fg-dim: #666680;
  --color-accent: #6366f1;
  --color-green: #22c55e;
  --color-red: #ef4444;
}
* { margin:0; padding:0; box-sizing:border-box }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--color-bg); color:var(--color-fg); line-height:1.6; min-height:100vh }
nav { display:flex; gap:20px; padding:12px 24px; border-bottom:1px solid var(--color-border); background:var(--color-bg-deep); font-size:0.9rem; position:sticky; top:0; z-index:100; align-items:center }
nav a { text-decoration:none }
.content { max-width:680px; margin:0 auto; padding:48px 24px }
.kicker { display:inline-block; background:var(--color-surface); color:var(--color-accent); padding:4px 14px; border-radius:20px; font-size:0.8rem; font-weight:600; margin-bottom:12px }
h1 { font-size:clamp(1.6rem, 4vw, 2.4rem); font-weight:800; margin-bottom:12px }
.subtitle { color:var(--color-fg-muted); font-size:1.05rem; line-height:1.6; margin-bottom:40px }
.card-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(200px, 1fr)); gap:12px; margin-bottom:32px }
.card { background:var(--color-surface); border:1px solid var(--color-border); border-radius:12px; padding:20px; cursor:pointer; transition:all 0.15s; color:var(--color-fg); text-align:left; font-family:inherit; font-size:inherit }
.card:hover { border-color:var(--color-accent) }
.card.active { border:2px solid var(--color-accent); background:var(--color-bg-deep) }
.card .emoji { font-size:1.5rem; margin-bottom:6px }
.card .title { font-size:0.88rem; font-weight:700; margin-bottom:4px }
.card .desc { font-size:0.78rem; color:var(--color-fg-dim); margin-bottom:6px }
.card .price-tag { font-size:0.72rem; color:var(--color-accent); font-weight:600 }
.lead-form { background:var(--color-surface); border:1px solid var(--color-border); border-radius:12px; padding:28px; max-width:440px; margin:0 auto }
.lead-form .label { font-size:0.85rem; color:var(--color-fg-muted); margin-bottom:12px }
.form-row { display:flex; gap:8px }
.form-row input { flex:1; padding:12px 16px; border-radius:8px; border:1px solid var(--color-border); background:var(--color-bg-deep); color:var(--color-fg); font-size:0.95rem; outline:none }
.form-row input:focus { border-color:var(--color-accent) }
.form-row button { padding:12px 20px; border-radius:8px; border:none; font-weight:700; cursor:pointer; white-space:nowrap; font-size:0.95rem; transition:all 0.15s }
.form-row button.ready { background:var(--color-accent); color:#fff }
.form-row button.ready:hover { opacity:0.9 }
.form-row button.loading { background:var(--color-fg-dim); color:#fff; cursor:not-allowed }
.error-msg { color:var(--color-red); font-size:0.8rem; margin-top:6px; display:none }
.disclaimer { text-align:center; margin-top:32px; color:var(--color-fg-dim); font-size:0.85rem; line-height:1.6 }
.content-panel { display:none; max-width:720px; margin:0 auto; padding:40px 24px }
.content-header { text-align:center; margin-bottom:32px }
.content-header .big-emoji { font-size:2.5rem; display:block; margin-bottom:8px }
.content-header h2 { font-size:1.6rem; font-weight:800; margin-bottom:4px }
.content-header .instantly { color:var(--color-fg-muted); font-size:0.9rem }
.content-section { background:var(--color-surface); border:1px solid var(--color-border); border-radius:10px; padding:24px; margin-bottom:20px }
.content-section .section-label { font-size:0.78rem; color:var(--color-fg-dim); margin-bottom:8px; font-weight:600 }
.content-section .section-body { font-size:0.85rem; color:var(--color-fg); line-height:1.7 }
.content-section .template { background:var(--color-bg-deep); border-radius:8px; padding:16px; margin-bottom:12px }
.content-section .example { background:var(--color-bg-deep); border-radius:8px; padding:16px }
.upsell { background:linear-gradient(135deg, var(--color-accent), #7c3aed); border-radius:12px; padding:32px 28px; margin-top:32px; color:#fff; text-align:center }
.upsell h3 { font-size:1.3rem; font-weight:800; margin-bottom:8px }
.upsell p { opacity:.9; margin-bottom:20px; line-height:1.6; font-size:0.95rem }
.upsell a { background:#fff; color:var(--color-accent); padding:14px 40px; border-radius:10px; font-weight:700; font-size:1.05rem; text-decoration:none; display:inline-block }
.upsell .guarantee { opacity:.7; font-size:0.75rem; margin-top:10px }
.more-freebies { text-align:center; margin-top:48px }
.more-freebies p { color:var(--color-fg-dim); font-size:0.85rem; margin-bottom:12px }
.more-freebies .btns { display:flex; gap:10px; justify-content:center; flex-wrap:wrap }
.more-freebies .btns a { background:var(--color-surface); border:1px solid var(--color-border); border-radius:8px; padding:10px 16px; text-decoration:none; color:var(--color-fg); font-size:0.85rem }
.more-freebies .btns a:hover { border-color:var(--color-accent) }
.back-link { display:block; text-align:center; margin-top:48px; color:var(--color-accent); font-size:0.9rem; cursor:pointer }
.bold { font-weight:700 }
.hidden { display:none }
</style>
</head>
<body>

<nav>
  <a style="color:var(--color-accent);font-weight:700;font-size:0.95rem" href="store.html">📣 Store</a>
  <a style="color:var(--color-green);font-weight:600" href="freebies.html">🎡 Free Samples</a>
  <a style="color:var(--color-fg-dim);font-weight:500;font-size:0.82rem;margin-left:auto" href="analytics.html">💊</a>
</nav>

</body>
</html>
